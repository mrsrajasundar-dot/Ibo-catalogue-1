<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBO Smart Catalog</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background: #ffffff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; position: relative; }
        .splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #b91c1c; color: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 24px; font-weight: 800; opacity: 1; transition: opacity 0.4s; text-align: center; padding: 20px; pointer-events: none; }
        .app-header { background: #b91c1c; color: #ffffff; padding: 20px 15px; text-align: center; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #a21a1a; }
        .app-header-title { font-size: 22px; font-weight: 800; color: #ffffff; }
        .tab-bar { display: flex; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 14px 10px; border: none; background: none; font-weight: 600; cursor: pointer; color: #64748b; font-size: 13px; }
        .tab-btn.active { background: #ffffff; color: #334155; border-bottom: 3px solid #334155; }
        .tab-content { padding: 20px; display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #475569; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 13px; background: #334155; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .data-counter { text-align: center; font-size: 14px; color: #ffffff; font-weight: bold; background: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 99999; display: none; }
        .modal-content { background: #fff; width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<!-- ... (Keep your existing HTML structure until Admin Tab) ... -->
<div class="app-container">
    <div class="app-header"><div class="app-header-title">IBO Smart Catalog</div></div>
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('search-tab', this)">🔍 Search</button>
        <button class="tab-btn" onclick="switchTab('folder-tab', this)">📂 Folder</button>
        <button class="tab-btn" onclick="switchTab('admin-tab', this)">⚙️ Admin</button>
    </div>

    <div id="admin-tab" class="tab-content">
        <div id="adminLockScreen">
            <h3 style="margin-top:0;">🔒 Admin Authentication</h3>
            <div class="form-group"><input type="password" id="adminPasswordInput" placeholder="Enter Password..."></div>
            <button class="btn-primary" onclick="checkAdminPassword()">Verify & Unlock</button>
        </div>
        <div id="adminContentPanel" style="display:none;">
            <div class="data-counter" id="totalItemsCounter">Stock Ready</div>
            <h4>➕ Add Product</h4>
            <select id="aCat" onchange="filterAdminClass()"><option value="">Category</option></select>
            <select id="aCls" onchange="filterAdminSub()"><option value="">Class</option></select>
            <select id="aSub" onchange="filterAdminBrand()"><option value="">Sub Class</option></select>
            <select id="aBrand"><option value="">Brand</option></select>
            <input type="text" id="addId" placeholder="Offer ID" style="margin-top:10px;">
            <input type="text" id="addName" placeholder="Product Name" style="margin-top:10px;">
            <button class="btn-primary" onclick="addSingleProduct()">Save Product</button>
        </div>
    </div>
</div>

<script>
// --- ADMIN DYNAMIC LOGIC ---
function initAdminAddForm() {
    let cats = [...new Set(catalogData.map(i => i.cat))];
    populateDropdown("aCat", cats, "Category");
}

function filterAdminClass() {
    let cat = document.getElementById("aCat").value;
    let cls = [...new Set(catalogData.filter(i => i.cat === cat).map(i => i.cls))];
    populateDropdown("aCls", cls, "Class");
}

function filterAdminSub() {
    let cat = document.getElementById("aCat").value;
    let cls = document.getElementById("aCls").value;
    let subs = [...new Set(catalogData.filter(i => i.cat === cat && i.cls === cls).map(i => i.sub))];
    populateDropdown("aSub", subs, "Sub Class");
}

function filterAdminBrand() {
    let cat = document.getElementById("aCat").value;
    let cls = document.getElementById("aCls").value;
    let sub = document.getElementById("aSub").value;
    let brands = [...new Set(catalogData.filter(i => i.cat === cat && i.cls === cls && i.sub === sub).map(i => i.brand))];
    populateDropdown("aBrand", brands, "Brand");
}

function populateDropdown(id, list, label) {
    let s = document.getElementById(id);
    s.innerHTML = `<option value="">${label}</option>`;
    list.filter(Boolean).sort().forEach(v => {
        let opt = document.createElement("option"); opt.value = v; opt.innerText = v;
        s.appendChild(opt);
    });
}

function addSingleProduct() {
    let newProd = {
        id: document.getElementById("addId").value,
        cat: document.getElementById("aCat").value,
        cls: document.getElementById("aCls").value,
        sub: document.getElementById("aSub").value,
        brand: document.getElementById("aBrand").value,
        name: document.getElementById("addName").value
    };
    catalogData.push(newProd);
    alert("Saved Successfully!");
}

function checkAdminPassword() {
    if(document.getElementById("adminPasswordInput").value === "raja123") {
        document.getElementById("adminLockScreen").style.display = "none";
        document.getElementById("adminContentPanel").style.display = "block";
        initAdminAddForm();
    } else { alert("Wrong Password!"); }
}

// ... (Rest of your existing functions like switchTab, loadCentralCSV, etc.)
</script>
</body>
</html>
