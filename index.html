<!-- FOLDER SELECTION POPUP HTML -->
<div id="folderSelectionPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:12px; width:85%; max-width:400px;">
        <h4 style="margin-top:0;">Select Folder</h4>
        <div id="folderListContainer" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
        <div style="border-top:1px solid #ccc; padding-top:10px;">
            <input type="text" id="newFolderName" placeholder="Enter New Folder Name..." style="width:100%; padding:8px; box-sizing:border-box; margin-bottom:10px;">
            <button class="btn-primary" onclick="createNewFolderAndSelect()">Create & Select New</button>
            <button onclick="document.getElementById('folderSelectionPopup').style.display='none'" style="width:100%; padding:8px; margin-top:5px; border:none; background:#ccc; border-radius:6px;">Cancel</button>
        </div>
    </div>
</div>

<script>
let allFolders = { "Default": [] }; // Initial state
let currentSelectedFolder = "Default";
let pendingItem = null;

// ADD BUTTON MODIFIED
function addToExportFolder(id) {
    pendingItem = catalogData.find(i => i.id === id);
    renderFolderPopup();
    document.getElementById('folderSelectionPopup').style.display = 'flex';
}

function renderFolderPopup() {
    let container = document.getElementById('folderListContainer');
    container.innerHTML = "";
    Object.keys(allFolders).forEach(folderName => {
        container.innerHTML += `<div onclick="selectFolder('${folderName}')" style="padding:10px; border-bottom:1px solid #eee; cursor:pointer; font-weight:${currentSelectedFolder === folderName ? 'bold' : 'normal'}; color:${currentSelectedFolder === folderName ? '#2563eb' : '#333'}">${folderName}</div>`;
    });
}

function selectFolder(name) {
    currentSelectedFolder = name;
    finalizeAdd();
}

function createNewFolderAndSelect() {
    let name = document.getElementById('newFolderName').value.trim();
    if(name && !allFolders[name]) {
        allFolders[name] = [];
        currentSelectedFolder = name;
        document.getElementById('newFolderName').value = "";
        finalizeAdd();
    }
}

function finalizeAdd() {
    let qtyVal = parseInt(document.getElementById(`qty_${pendingItem.id}`).value) || 1;
    allFolders[currentSelectedFolder].push({ id: pendingItem.id, name: pendingItem.name, qty: qtyVal });
    document.getElementById('folderSelectionPopup').style.display = 'none';
    showToast(`Added to folder: ${currentSelectedFolder}! ✅`);
    updateCartUI();
}

// UPDATE UI TO SHOW DYNAMIC FOLDERS
function updateCartUI() {
    let container = document.getElementById("cartItemsContainer");
    container.innerHTML = "";
    let totalItems = 0;
    
    Object.keys(allFolders).forEach(folderName => {
        if(allFolders[folderName].length > 0) {
            container.innerHTML += `<div style="margin-top:15px; font-weight:bold; color:#2563eb;">📂 ${folderName}</div>`;
            allFolders[folderName].forEach((item, index) => {
                totalItems++;
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:5px 0; font-size:12px;">
                        <div>${item.name} (Qty: ${item.qty})</div>
                        <span style="color:red; cursor:pointer;" onclick="removeFromFolder('${folderName}', ${index})">❌</span>
                    </div>`;
            });
        }
    });
    document.getElementById("cartCountBadge").innerText = totalItems;
}

function removeFromFolder(folderName, index) {
    allFolders[folderName].splice(index, 1);
    updateCartUI();
}
</script>
