<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBO Smart Catalog</title>
    <style>
        /* Splash Screen */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#b91c1c; color:white; display:flex; align-items:center; justify-content:center; z-index:9999; font-size:20px; font-weight:bold; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background: #ffffff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        .app-header { background: #ffffff; color: #b91c1c; padding: 20px 15px; text-align: center; border-bottom: 2px solid #f1f5f9; }
        .app-header-title { font-size: 22px; font-weight: 800; color: #b91c1c; }
        
        .tab-bar { display: flex; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; }
        .tab-btn { flex: 1; padding: 14px 10px; border: none; background: none; font-weight: 600; color: #64748b; font-size: 13px; cursor: pointer; }
        .tab-btn.active { background: #ffffff; color: #334155; border-bottom: 3px solid #334155; }
        
        .tab-content { padding: 20px; display: none; }
        .tab-content.active { display: block; }
        
        .btn-primary { width: 100%; padding: 13px; background: #334155; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-success { width: 100%; padding: 13px; background: #16a34a; color: white; border: none; border-radius: 8px; margin-top: 10px; }
        .data-counter { text-align: center; font-size: 14px; color: #ffffff; background: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight:bold;}
        
        /* New Folder Popup Styles */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal-content { background:white; padding:20px; border-radius:10px; width:80%; }
    </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">Welcome to IBO Smart Catalogue</div>

<div class="app-container">
    <div class="app-header">
        <div class="app-header-title">IBO Smart Catalog</div>
    </div>
    
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('search-tab', this)">🔍 Search</button>
        <button class="tab-btn" onclick="switchTab('folder-tab', this)">📂 Folder</button>
        <button class="tab-btn" onclick="switchTab('admin-tab', this)">⚙️ Admin</button>
    </div>

    <div id="search-tab" class="tab-content active">
        <!-- Content remains same -->
        <button class="btn-primary" onclick="showFolderPopup('sample_id')">Add to Folder</button>
    </div>

    <!-- Admin Panel -->
    <div id="admin-tab" class="tab-content">
        <div id="adminLockScreen">
            <input type="password" id="adminPasswordInput" placeholder="Password...">
            <button class="btn-primary" onclick="checkAdminPassword()">Unlock</button>
        </div>
        <div id="adminContentPanel" style="display:none;">
            <div class="data-counter" id="totalItemsCounter">Stock Items: 0</div>
            <button class="btn-success" onclick="downloadServerExcel()">📥 Download Server Master Excel</button>
        </div>
    </div>
</div>

<!-- Folder Selection Modal -->
<div id="folderModal" class="modal">
    <div class="modal-content">
        <h3>Select Folder</h3>
        <div id="folderList"></div>
        <input type="text" id="newFolderName" placeholder="New Folder Name">
        <button onclick="createAndAddFolder()">Add New</button>
    </div>
</div>

<script>
    // Splash logic
    window.onload = function() {
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);
    }
    document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
            document.getElementById('splash').style.display = 'flex';
            setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);
        }
    });

    // Admin Session Lock
    function switchTab(tabId, btn) {
        if(tabId === 'admin-tab') {
            document.getElementById("adminContentPanel").style.display = "none";
            document.getElementById("adminLockScreen").style.display = "block";
        }
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
    }

    function checkAdminPassword() {
        if(document.getElementById("adminPasswordInput").value === "raja123") {
            document.getElementById("adminContentPanel").style.display = "block";
            document.getElementById("adminLockScreen").style.display = "none";
        }
    }

    // Server Download
    function downloadServerExcel() {
        alert("Downloading Server Master Excel...");
        // Logic to export current catalogData to CSV
    }

    // Simple Folder logic
    let folders = ["Default Folder"];
    function showFolderPopup(id) { document.getElementById('folderModal').style.display = 'flex'; }
    function createAndAddFolder() {
        let name = document.getElementById('newFolderName').value;
        if(name) folders.push(name);
        document.getElementById('folderModal').style.display = 'none';
    }
</script>
</body>
</html>
