<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Catalog Central Pro</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f3f4f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background: #ffffff; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e5e7eb; }
        .app-header { background: #0284c7; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        .tab-bar { display: flex; background: #e2e8f0; border-bottom: 1px solid #cbd5e1; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 600; cursor: pointer; color: #475569; font-size: 13px; }
        .tab-btn.active { background: #ffffff; color: #0284c7; border-bottom: 3px solid #0284c7; }
        .tab-content { padding: 20px; display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; color: #374151; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; background: #fff; }
        .btn-primary { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary:active { background: #0369a1; }
        .btn-success { width: 100%; padding: 12px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-success:active { background: #15803d; }
        .result-section { margin-top: 20px; background: #f0f9ff; border: 1px dashed #0284c7; border-radius: 10px; padding: 15px; }
        .product-card { background: #ffffff; border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .copy-tile { background: #f8fafc; border: 1px solid #e2e2e2; border-radius: 6px; padding: 8px; margin-top: 6px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .tile-label { font-size: 11px; color: #64748b; text-transform: uppercase; font-weight: 600; }
        .tile-value { font-size: 14px; font-weight: bold; color: #0f172a; }
        .copy-btn { font-size: 11px; color: #0284c7; font-weight: bold; background: #e0f2fe; padding: 3px 6px; border-radius: 4px; }
        .data-counter { text-align: center; font-size: 13px; color: #1e293b; font-weight: bold; margin-bottom: 15px; background: #f1f5f9; padding: 8px; border-radius: 6px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 1000; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0284c7; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .cart-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .qty-input { width: 70px; padding: 5px; font-size: 14px; border: 1px solid #cbd5e1; border-radius: 4px; text-align: center; }
        .btn-add-cart { padding: 6px 12px; background: #16a34a; color: white; border: none; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
        .contact-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 20px; text-align: center; margin-top: 10px; }
        .contact-name { font-size: 20px; font-weight: bold; color: #16a34a; margin: 5px 0; }
        .contact-phone { font-size: 18px; font-weight: bold; color: #1e293b; text-decoration: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">Smart Catalog Central</div>
    
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('search-tab', this)">🔍 Search Engine</button>
        <button class="tab-btn" onclick="switchTab('folder-tab', this)">📂 Export Folder (<span id="cartCountBadge">0</span>)</button>
        <button class="tab-btn" onclick="switchTab('info-tab', this)">📞 Contact</button>
    </div>

    <!-- TAB 1: SEARCH ENGINE -->
    <div id="search-tab" class="tab-content active">
        <div class="data-counter" id="totalItemsCounter">
            <div class="loading-spinner"></div>
            Connecting Central Database...
        </div>
        
        <div id="filterFieldsForm" style="display:none;">
            <!-- MASTER SEARCH BOX -->
            <div class="form-group">
                <label style="color:#0284c7;">🎯 Master Search (Offer ID / Product Name)</label>
                <input type="text" id="masterSearchInput" placeholder="Type Offer ID or Name here..." oninput="handleMasterSearch()">
            </div>

            <div style="text-align: center; font-size: 12px; color: #64748b; margin: 10px 0;">— OR USE DROPDOWNS SEPARATELY —</div>

            <!-- CASCADING INDEPENDENT FILTERS -->
            <div class="form-group">
                <label>Category</label>
                <select id="category" onchange="handleDropdownChange('cat')"><option value="">-- All Categories --</option></select>
            </div>
            <div class="form-group">
                <label>Class</label>
                <select id="class" onchange="handleDropdownChange('cls')"><option value="">-- All Classes --</option></select>
            </div>
            <div class="form-group">
                <label>Sub Class</label>
                <select id="subclass" onchange="handleDropdownChange('sub')"><option value="">-- All Sub Classes --</option></select>
            </div>
            <div class="form-group">
                <label>Brand</label>
                <select id="brand" onchange="handleDropdownChange('brand')"><option value="">-- All Brands --</option></select>
            </div>
            
            <div class="result-section" id="resultSection" style="display:none;">
                <div style="font-weight:bold; color:#0369a1; margin-bottom:12px;">🎯 Results Found:</div>
                <div id="multipleResultsContainer"></div>
            </div>
        </div>
    </div>

    <!-- TAB 2: EXPORT FOLDER -->
    <div id="folder-tab" class="tab-content">
        <h3 style="margin-top:0; color:#0f172a;">📂 Saved Folder Items</h3>
        <p style="font-size:12px; color:#64748b; margin-bottom:15px;">Inge save seiyum data-vai Excel (CSV) file-ah dynamic export seiyalam.</p>
        
        <div id="cartItemsContainer" style="margin-bottom:20px;">
            <p style='text-align:center; color:#94a3b8; font-size:13px; padding:20px;'>Folder is empty.</p>
        </div>
        
        <button class="btn-success" id="btnExportExcel" onclick="exportFolderToCSV()" style="display:none;">📊 Export Folder to Excel</button>
        <button class="btn-primary" style="background:#ef4444; margin-top:10px;" onclick="clearFolder()">🚨 Clear Full Folder</button>
    </div>

    <!-- TAB 3: CONTACT INFORMATION -->
    <div id="info-tab" class="tab-content">
        <div class="contact-box">
            <div style="font-size:14px; color:#475569; font-weight:600;">Need changes pannanum na please contact</div>
            <div class="contact-name">Raja</div>
            <a href="tel:+918072613468" class="contact-phone">📞 +91 8072613468</a>
        </div>
    </div>
</div>

<div class="toast" id="toastBox">Copied!</div>

<script>
let catalogData = [];
let exportFolder = [];

function loadCentralCSV() {
    fetch('IBO STOCK-1.csv')
    .then(response => {
        if (!response.ok) throw new Error('CSV File missing!');
        return response.text();
    })
    .then(text => parseCSVTextData(text))
    .catch(error => {
        document.getElementById("totalItemsCounter").innerHTML = `🚨 Error: IBO STOCK-1.csv File missing in GitHub folder!`;
    });
}

function parseCSVTextData(text) {
    let lines = text.split(/\r?\n/);
    let headerIndex = -1;
    for(let i = 0; i < Math.min(lines.length, 10); i++) {
        if(lines[i].includes("offerid") || lines[i].includes("offer") || lines[i].includes("category")) {
            headerIndex = i; break;
        }
    }
    let startIndex = headerIndex !== -1 ? headerIndex + 1 : 1;
    
    for(let i = startIndex; i < lines.length; i++) {
        let line = lines[i].trim();
        if(!line) continue;
        let columns = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        if(columns.length >= 6) {
            let id = columns[0].replace(/^"|"$/g, '').replace(/\\_/g, '_').trim();
            let cat = columns[1].replace(/^"|"$/g, '').replace(/\\_/g, '_').trim();
            let cls = columns[2].replace(/^"|"$/g, '').replace(/\\_/g, '_').trim();
            let sub = columns[3].replace(/^"|"$/g, '').replace(/\\_/g, '_').trim();
            let brand = columns[4].replace(/^"|"$/g, '').replace(/\\_/g, '_').trim();
            let name = columns[5].replace(/^"|"$/g, '').replace(/\\_/g, '_').trim();
            
            if(id && name && !id.includes("IBO") && !id.includes("offer")) {
                catalogData.push({ id, cat, cls, sub, brand, name });
            }
        }
    }
    document.getElementById("totalItemsCounter").innerText = `🟢 Cloud Database Loaded: ${catalogData.length} Items`;
    document.getElementById("filterFieldsForm").style.display = "block";
    populateAllDropdownsInitial();
}

function populateAllDropdownsInitial() {
    populateSingleDropdown("category", [...new Set(catalogData.map(i => i.cat))]);
    populateSingleDropdown("class", [...new Set(catalogData.map(i => i.cls))]);
    populateSingleDropdown("subclass", [...new Set(catalogData.map(i => i.sub))]);
    populateSingleDropdown("brand", [...new Set(catalogData.map(i => i.brand))]);
}

function populateSingleDropdown(id, list) {
    let select = document.getElementById(id);
    let currentVal = select.value;
    select.innerHTML = `<option value="">-- All ${id.charAt(0).toUpperCase() + id.slice(1)}s --</option>`;
    list.filter(Boolean).sort().forEach(v => {
        let opt = document.createElement("option");
        opt.value = v; opt.innerText = v;
        if(v === currentVal) opt.selected = true;
        select.appendChild(opt);
    });
}

function handleMasterSearch() {
    let query = document.getElementById("masterSearchInput").value.toLowerCase().trim();
    if(!query) {
        document.getElementById("resultSection").style.display = "none";
        return;
    }
    resetDropdownSelectionsExcept("");
    
    let matches = catalogData.filter(item => item.id.toLowerCase().includes(query) || item.name.toLowerCase().includes(query));
    renderCatalogCards(matches.slice(0, 150));
}

function handleDropdownChange(triggeredFilter) {
    document.getElementById("masterSearchInput").value = "";
    
    let catVal = document.getElementById("category").value;
    let clsVal = document.getElementById("class").value;
    let subVal = document.getElementById("subclass").value;
    let brdVal = document.getElementById("brand").value;
    
    let matches = catalogData;
    if(catVal) matches = matches.filter(i => i.cat === catVal);
    if(clsVal) matches = matches.filter(i => i.cls === clsVal);
    if(subVal) matches = matches.filter(i => i.sub === subVal);
    if(brdVal) matches = matches.filter(i => i.brand === brdVal);
    
    if(!catVal) populateSingleDropdown("category", [...new Set(matches.map(i => i.cat))]);
    if(!clsVal) populateSingleDropdown("class", [...new Set(matches.map(i => i.cls))]);
    if(!subVal) populateSingleDropdown("subclass", [...new Set(matches.map(i => i.sub))]);
    if(!brdVal) populateSingleDropdown("brand", [...new Set(matches.map(i => i.brand))]);
    
    renderCatalogCards(matches);
}

function renderCatalogCards(dataList) {
    let container = document.getElementById("multipleResultsContainer");
    container.innerHTML = "";
    
    if(dataList.length > 0) {
        dataList.forEach((match) => {
            container.innerHTML += `
                <div class="product-card">
                    <div class="copy-tile" onclick="copyTextDirect('${match.id}', 'Offer ID')">
                        <div><span class="tile-label">Offer ID</span><br><span class="tile-value">${match.id}</span></div>
                        <div class="copy-btn">📋 Copy</div>
                    </div>
                    <div class="copy-tile" onclick="copyTextDirect('${match.name}', 'Product Name')">
                        <div><span class="tile-label">Product Name</span><br><span class="tile-value">${match.name}</span></div>
                        <div class="copy-btn">📋 Copy</div>
                    </div>
                    <div class="cart-controls">
                        <div><span style="font-size:12px; font-weight:600; color:#475569;">Qty:</span>
                        <input type="number" class="qty-input" id="qty_${match.id}" value="1" min="1"></div>
                        <button class="btn-add-cart" onclick="addToExportFolder('${match.id}')">➕ Add to Export Folder</button>
                    </div>
                </div>
            `;
        });
        document.getElementById("resultSection").style.display = "block";
    } else {
        container.innerHTML = "<div style='text-align:center; font-size:13px; color:#64748b; padding:10px;'>No matching records found.</div>";
        document.getElementById("resultSection").style.display = "block";
    }
}

function addToExportFolder(id) {
    let item = catalogData.find(i => i.id === id);
    let qtyVal = parseInt(document.getElementById(`qty_${id}`).value) || 1;
    
    let existingIndex = exportFolder.findIndex(i => i.id === id);
    if(existingIndex > -1) {
        exportFolder[existingIndex].qty += qtyVal;
    } else {
        exportFolder.push({ id: item.id, name: item.name, qty: qtyVal });
    }
    
    updateCartUI();
    showToast("Added to Export Folder! ✔️");
}

function updateCartUI() {
    document.getElementById("cartCountBadge").innerText = exportFolder.length;
    let container = document.getElementById("cartItemsContainer");
    let btnExcel = document.getElementById("btnExportExcel");
    
    container.innerHTML = "";
    if(exportFolder.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:#94a3b8; font-size:13px; padding:20px;'>Folder is empty.</p>";
        btnExcel.style.display = "none";
        return;
    }
    
    exportFolder.forEach((item, index) => {
        container.innerHTML += `
            <div class="cart-item-row">
                <div style="max-width: 70%;">
                    <strong>${item.id}</strong> - <span style="color:#475569;">${item.name}</span>
                </div>
                <div>
                    <span style="background:#e0f2fe; color:#0369a1; padding:3px 8px; border-radius:4px; font-weight:bold;">Qty: ${item.qty}</span>
                    <span style="color:#ef4444; font-weight:bold; margin-left:10px; cursor:pointer;" onclick="removeFromFolder(${index})">❌</span>
                </div>
            </div>
        `;
    });
    btnExcel.style.display = "block";
}

function removeFromFolder(index) {
    exportFolder.splice(index, 1);
    updateCartUI();
}

function clearFolder() {
    exportFolder = [];
    updateCartUI();
    showToast("Folder Cleared!");
}

function exportFolderToCSV() {
    if(exportFolder.length === 0) return;
    
    let csvContent = "data:text/csv;charset=utf-8,";
    csvContent += "Offer ID,Product Name,Quantity\n";
    
    exportFolder.forEach(item => {
        let cleanName = item.name.replace(/"/g, '""');
        csvContent += `"${item.id}","${cleanName}",${item.qty}\n`;
    });
    
    let encodedUri = encodeURI(csvContent);
    let link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `Catalog_Export_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function resetDropdownSelectionsExcept(id) {
    if(id !== 'cat') document.getElementById("category").value = "";
    if(id !== 'cls') document.getElementById("class").value = "";
    if(id !== 'sub') document.getElementById("subclass").value = "";
    if(id !== 'brand') document.getElementById("brand").value = "";
}

function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).style.display = 'block';
    if(btn) btn.classList.add('active');
}

function copyTextDirect(text, label) {
    navigator.clipboard.writeText(text).then(() => showToast(label + " Copied! 👍"));
}

function showToast(msg) {
    let t = document.getElementById("toastBox"); t.innerText = msg; t.style.display = "block"; setTimeout(() => t.style.display="none", 2000);
}

window.onload = function() {
    loadCentralCSV();
};
</script>
</body>
</html>
